<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <title>components</title>

    <style>
        /* src/App.css */
    .app {
   /*text-align: center;*/
    padding: 20px;
    }

    .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 20px;
    }

    /* src/Product.css */
    .product-card {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 15px;
    background-color: #fff;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    transition: transform 0.2s ease;
}

    .product-card:hover {
    transform: scale(1.03);
}

    .product-card img {
    width: 100%;
    border-radius: 4px;
}

    .product-card h2 {
    font-size: 1.2rem;
    margin: 10px 0 5px;
}

    .product-card p {
    font-size: 0.9rem;
    color: #555;
}

   .price {
    font-weight: bold;
    color: #333;
}

    .rating {
    margin-top: 5px;
    color: gold;
}

    .icons {
    margin-top: 10px;
    font-size: 1.2rem;
    display: flex;
    justify-content: space-between;
}



    </style>
</head>

<body>
    <div id="container"></div>
   <!-- <div id="fundamentals"></div>
    <div id="subconcepts"></div>
    <div id="methods"></div>
    <div id="imgsrc"></div>
    <div id="buttons"></div>-->
    <!--packages like react,reactdom,babel links needs to be mentioned
    that tell the browser and console to allow and render the react components-->

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">

        const products = [ { id: 1, name: 'Laptop', price: 999, description: 'A high-performance laptop.' }, 
        { id: 2, name: 'Smartphone', price: 699, description: 'A latest model smartphone.' }, 
        { id: 3, name: 'Headphones', price: 199, description: 'Noise-cancelling headphones.' },
         { id: 4, name: 'Smartwatch', price: 199, description: 'A smartwatch with fitness tracking.' }, 
         { id: 5, name: 'Tablet', price: 499, description: 'A lightweight tablet for productivity.' }, 
         { id: 6, name: 'Bluetooth Speaker', price: 149, description: 'Portable Bluetooth speaker with great sound.' }, 
         { id: 7, name: 'Gaming Console', price: 299, description: 'Next-gen gaming console with amazing graphics.' }, 
         { id: 8, name: '4K Monitor', price: 399, description: 'High-resolution monitor for gaming and work.' }, 
         { id: 9, name: 'Wireless Mouse', price: 49, description: 'Ergonomic wireless mouse for comfort.' }, 
         { id: 10, name: 'Mechanical Keyboard', price: 89, description: 'A mechanical keyboard for gamers and typists.' }, 
         { id: 11, name: 'External Hard Drive', price: 129, description: '1TB external hard drive for storage.' },
         { id: 12, name: 'External Hard Drives', price: 125, description: '1TB external hard drive for storage.' } ];
         
         
         function App() {
             return ( <div className="app"> 
            <h1>Explore Our Products</h1> <button onClick={{}}>add product</button>
            <button onClick={{}}>out of stock</button>
            <button onClick={{}}>total orders</button>
            
             <div className="product-grid">
             {products.map(product => ( 
            <Product key={product.id} 
            name={product.name} 
            price={product.price} 
            description={product.description}
             /> ))} </div> </div> ); }

            // src/Product.js

        function Product({ name, price, description }) {
           return (
           <div className="product-card">
           <img src={"https://qvc.scene7.com/is/image/QVC/e/83/e320983.002"} alt={name} />
           <h2>{name}</h2>
           <p>{description}</p>
           <p className="price">${price}</p>
           <div className="rating">★★★★★ (325)</div>
           <div className="icons">
           <span>❤️</span>
        <span>👁️</span>
      </div>
    </div>
  );
}

   ReactDOM.render(<App/>,document.getElementById('container'))
    </script>

    </body>

    </html>
